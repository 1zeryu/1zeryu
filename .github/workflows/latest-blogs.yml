name: Latest blog posts

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/latest-blogs.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://1zeryu.github.io/blogs/index.xml"
          max_post_count: 5
          readme_path: "README.md"
